{% extends 'base.html' %}
{% block title %}Edit Student{% endblock %}

{% block content %}

<div class="card p-4">

<h3 class="mb-4">Edit Student Details</h3>

<form method="POST">
{% csrf_token %}

<div class="row">

<!-- BASIC -->
<div class="col-md-6">
<label>Name</label>
<input name="name" class="form-control mb-2"
value="{{ student.name|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Roll No</label>
<input name="roll_no" class="form-control mb-2"
value="{{ student.roll_no|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Department</label>
<input name="department" class="form-control mb-2"
value="{{ student.department|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Admission Year</label>
<input name="admission_year" class="form-control mb-2"
value="{{ student.admission_year|default_if_none:'' }}">
</div>

<!-- PERSONAL -->
<div class="col-md-6">
<label>DOB</label>
<input type="date" name="dob" class="form-control mb-2"
value="{{ student.dob|date:'Y-m-d' }}">
</div>

<div class="col-md-6">
<label>Gender</label>
<select name="gender" class="form-control mb-2">
<option value="">Select</option>
<option value="Male" {% if student.gender == "Male" %}selected{% endif %}>Male</option>
<option value="Female" {% if student.gender == "Female" %}selected{% endif %}>Female</option>
</select>
</div>

<div class="col-md-6">
<label>Blood Group</label>
<input name="blood_group" class="form-control mb-2"
value="{{ student.blood_group|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Religion</label>
<input name="religion" class="form-control mb-2"
value="{{ student.religion|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Category</label>
<input name="category" class="form-control mb-2"
value="{{ student.category|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Aadhaar</label>
<input name="aadhaar" class="form-control mb-2"
value="{{ student.aadhaar|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Physically Challenged</label>
<select name="physically_challenged" class="form-control mb-2">
<option value="False" {% if not student.physically_challenged %}selected{% endif %}>No</option>
<option value="True" {% if student.physically_challenged %}selected{% endif %}>Yes</option>
</select>
</div>

<!-- CONTACT -->
<div class="col-md-6">
<label>Phone</label>
<input name="phone" class="form-control mb-2"
value="{{ student.phone|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Email</label>
<input name="email" class="form-control mb-2"
value="{{ student.email|default_if_none:'' }}">
</div>

<div class="col-md-12">
<label>Permanent Address</label>
<textarea name="permanent_address" class="form-control mb-2">{{ student.permanent_address|default_if_none:'' }}</textarea>
</div>

<!-- FAMILY -->
<div class="col-md-6">
<label>Father Name</label>
<input name="father_name" class="form-control mb-2"
value="{{ student.father_name|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Mother Name</label>
<input name="mother_name" class="form-control mb-2"
value="{{ student.mother_name|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Father Occupation</label>
<input name="father_occupation" class="form-control mb-2"
value="{{ student.father_occupation|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Mother Occupation</label>
<input name="mother_occupation" class="form-control mb-2"
value="{{ student.mother_occupation|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Father Phone</label>
<input name="father_phone" class="form-control mb-2"
value="{{ student.father_phone|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Mother Phone</label>
<input name="mother_phone" class="form-control mb-2"
value="{{ student.mother_phone|default_if_none:'' }}">
</div>

<!-- ACADEMIC -->
<div class="col-md-6">
<label>10th Year</label>
<input name="tenth_year" class="form-control mb-2"
value="{{ student.tenth_year|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>10th %</label>
<input name="tenth_percentage" class="form-control mb-2"
value="{{ student.tenth_percentage|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>12th Year</label>
<input name="twelfth_year" class="form-control mb-2"
value="{{ student.twelfth_year|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>12th %</label>
<input name="twelfth_percentage" class="form-control mb-2"
value="{{ student.twelfth_percentage|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Course Type</label>
<select name="course" class="form-control mb-2">
<option value="">Select</option>
<option value="UG" {% if student.course == "UG" %}selected{% endif %}>UG</option>
<option value="PG" {% if student.course == "PG" %}selected{% endif %}>PG</option>
<option value="Research" {% if student.course == "Research" %}selected{% endif %}>Research</option>
</select>
</div>

<div class="col-md-6">
<label>Batch</label>
<input name="batch" class="form-control mb-2"
value="{{ student.batch|default_if_none:'' }}">
</div>

<div class="col-md-6">
<label>Hosteller</label>
<select name="hosteller" class="form-control mb-2">
<option value="False" {% if not student.hosteller %}selected{% endif %}>No</option>
<option value="True" {% if student.hosteller %}selected{% endif %}>Yes</option>
</select>
</div>

</div>

<!-- ACTION -->
<div class="mt-3 d-flex gap-2">
<button class="btn btn-success">Save Changes</button>
<a href="/student/{{ student.id }}/" class="btn btn-secondary">Cancel</a>
</div>

</form>

</div>

{% endblock %}
