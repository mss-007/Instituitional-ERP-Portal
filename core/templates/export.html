{% extends 'base.html' %}
{% block title %}Export Data{% endblock %}

{% block content %}

<div class="export-container">

<div class="card export-card">

<h3 class="mb-4 text-center">📊 Export Data</h3>

<form method="POST" action="/export-excel/">
{% csrf_token %}

<!-- 🔥 TYPE SWITCH -->
<div class="mb-4 text-center">
<label class="form-label">Select Data Type</label>

<div class="toggle-wrap">
    <input type="radio" id="student" name="type" value="student" checked onclick="toggleFields('student')">
    <label for="student">Student</label>

    <input type="radio" id="faculty" name="type" value="faculty" onclick="toggleFields('faculty')">
    <label for="faculty">Faculty</label>
</div>
</div>

<!-- 🎯 DEPARTMENT -->
<div class="mb-4">
<label class="form-label left-label">Department</label>

<select name="department" class="form-control centered-input">
    <option value="">All</option>
    {% for dept in departments %}
        <option value="{{ dept }}">{{ dept }}</option>
    {% endfor %}
</select>
</div>

<!-- 🎓 STUDENT FIELDS -->
<div id="studentFields">

<div class="d-flex justify-between align-center">
<h5>Student Fields</h5>

<label class="select-all">
<input type="checkbox" onclick="selectAll('studentFields', this)">
Select All
</label>
</div>

<div class="row">
    {% for field in student_fields %}
    <div class="col-md-4 field-box">
        <input type="checkbox" name="fields" value="{{ field }}">
        <label>{{ field|title }}</label>
    </div>
    {% endfor %}
</div>

</div>

<!-- 👨‍🏫 FACULTY FIELDS -->
<div id="facultyFields" style="display:none;">

<div class="d-flex justify-between align-center">
<h5>Faculty Fields</h5>

<label class="select-all">
<input type="checkbox" onclick="selectAll('facultyFields', this)">
Select All
</label>
</div>

<div class="row">
    {% for field in faculty_fields %}
    <div class="col-md-4 field-box">
        <input type="checkbox" name="fields" value="{{ field }}">
        <label>{{ field|title }}</label>
    </div>
    {% endfor %}
</div>

</div>

<button class="btn btn-success w-100 mt-4">
    Download Excel 📥
</button>

</form>

</div>

</div>

<!-- 🎨 STYLES -->
<style>

.export-container{
    display:flex;
    justify-content:center;
}

/* Card */
.export-card{
    width:100%;
    max-width:700px;
    border-radius:18px;
    padding:30px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
}

/* 🔥 Label left */
.left-label{
    display:block;
    text-align:left;
    font-weight:600;
    margin-bottom:6px;
}

/* 🔥 Dropdown centered but text left */
.centered-input{
    max-width:300px;
    margin:0 auto;
    text-align:left;
    border-radius:10px;
    transition:0.3s;
}

/* force option text left */
.centered-input option{
    text-align:left;
}

/* ✨ Glow */
.centered-input{
    box-shadow:0 0 6px rgba(37, 99, 235, 0.2);
}

.centered-input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37, 99, 235, 0.6);
}

/* Toggle */
.toggle-wrap{
    display:flex;
    justify-content:center;
    gap:10px;
}

.toggle-wrap input{
    display:none;
}

.toggle-wrap label{
    padding:8px 18px;
    border-radius:20px;
    background:#e2e8f0;
    cursor:pointer;
    transition:0.3s;
}

.toggle-wrap input:checked + label{
    background:#2563eb;
    color:white;
}

/* Field boxes */
.field-box {
    margin-bottom: 10px;
}

.field-box input {
    margin-right: 6px;
}

/* Layout helpers */
.d-flex{
    display:flex;
}

.justify-between{
    justify-content:space-between;
}

.align-center{
    align-items:center;
}

/* Select all */
.select-all{
    font-size:14px;
    cursor:pointer;
}

</style>

<!-- 🔥 SCRIPT -->
<script>

function toggleFields(type){

    document.getElementById("studentFields").style.display =
        type === "student" ? "block" : "none";

    document.getElementById("facultyFields").style.display =
        type === "faculty" ? "block" : "none";

    // clear all checkboxes
    document.querySelectorAll('input[name="fields"]').forEach(cb => {
        cb.checked = false;
    });

    // reset select all
    document.querySelectorAll('.select-all input').forEach(cb => {
        cb.checked = false;
    });
}

// 🔥 SELECT ALL
function selectAll(sectionId, source){

    let section = document.getElementById(sectionId);
    let checkboxes = section.querySelectorAll('input[name="fields"]');

    checkboxes.forEach(cb => {
        cb.checked = source.checked;
    });
}

</script>

{% endblock %}
