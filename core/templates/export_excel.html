{% extends 'base.html' %}
{% block title %}Export Data{% endblock %}

{% block content %}

<div class="export-container">

<div class="card export-card">

<h3 class="mb-4 text-center">📊 Export Data</h3>

<form method="POST" action="/export-excel/">
{% csrf_token %}

<!-- 🔥 TYPE SWITCH -->
<div class="mb-4">
<label class="form-label">Select Data Type</label>

<div class="toggle-wrap">
    <input type="radio" id="student" name="type" value="student" checked onclick="toggleFields('student')">
    <label for="student">Student</label>

    <input type="radio" id="faculty" name="type" value="faculty" onclick="toggleFields('faculty')">
    <label for="faculty">Faculty</label>
</div>
</div>


<!-- 🎯 DEPARTMENT -->
<div class="mb-4">
<label class="form-label">Department</label>

<select name="department" class="form-control">
    <option value="All">All</option>

    {% for dept in departments %}
        <option value="{{ dept }}">{{ dept }}</option>
    {% endfor %}
</select>

</div>

</select>

<!-- 🎓 STUDENT FIELDS -->
<div id="studentFields">

<h5>Student Fields</h5>

<div class="row">
    {% for field in student_fields %}
    <div class="col-md-4 field-box">
        <input type="checkbox" name="fields" value="{{ field }}">
        <label>{{ field|title }}</label>
    </div>
    {% endfor %}
</div>

</div>


<!-- 👨‍🏫 FACULTY FIELDS -->
<div id="facultyFields" style="display:none;">

<h5>Faculty Fields</h5>

<div class="checkbox-grid">

<label class="chk">
<input type="checkbox" name="fields" value="name">
<span>Name</span>
</label>

<label class="chk">
<input type="checkbox" name="fields" value="department">
<span>Department</span>
</label>

<label class="chk">
<input type="checkbox" name="fields" value="designation">
<span>Designation</span>
</label>

</div>

</div>


<button class="btn btn-success w-100 mt-4">
    Download Excel 📥
</button>

</form>

</div>

</div>


<!-- 🎨 STYLES -->
<style>

/* Container */
.export-container{
    display:flex;
    justify-content:center;
}

/* Card */
.export-card{
    width:100%;
    max-width:700px;
    border-radius:18px;
    padding:30px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
}

/* Inputs */
.modern-input{
    border-radius:10px;
    padding:10px;
}

/* Toggle */
.toggle-wrap{
    display:flex;
    gap:10px;
}

.toggle-wrap input{
    display:none;
}

.toggle-wrap label{
    padding:8px 18px;
    border-radius:20px;
    background:#e2e8f0;
    cursor:pointer;
    transition:0.3s;
}

.toggle-wrap input:checked + label{
    background:#2563eb;
    color:white;
}

/* Student fields */
.field-box {
    margin-bottom: 10px;
}

.field-box input {
    margin-right: 6px;
}

.field-box label {
    cursor: pointer;
}

/* Faculty grid */
.checkbox-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.chk{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-radius:10px;
    background:#f1f5f9;
    cursor:pointer;
    transition:0.3s;
}

.chk input{
    accent-color:#2563eb;
    transform:scale(1.2);
}

.chk:hover{
    background:#e0ecff;
}

</style>


<!-- 🔥 SCRIPT -->
<script>
function toggleFields(type){
    document.getElementById("studentFields").style.display =
        type === "student" ? "block" : "none";

    document.getElementById("facultyFields").style.display =
        type === "faculty" ? "block" : "none";
}
</script>

{% endblock %}
