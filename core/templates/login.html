{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

/* BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg, #e0ecff, #2563eb, #1e3a8a);
font-family:'Segoe UI', sans-serif;
overflow:hidden;
position:relative;
}

/* FLOAT EFFECT */
body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%);
top:-100px;
left:-100px;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(20px);}
}

/* LOGIN BOX */
.login-box{
width:400px;
padding:35px;
border-radius:18px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(14px);
color:white;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
text-align:center;
}

/* LOGO */
.logo{
width:70px;
margin-bottom:10px;
object-fit:contain;
}

/* TITLE */
.title{
font-size:20px;
font-weight:600;
line-height:1.4;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
opacity:0.85;
margin-bottom:20px;
}

/* INPUTS */
.form-control{
background:rgba(255,255,255,0.25);
border:none;
color:white;
border-radius:10px;
padding:10px;
transition:0.3s;
}

.form-control:focus{
background:rgba(255,255,255,0.35);
box-shadow:0 0 8px rgba(255,255,255,0.6);
outline:none;
}

.form-control::placeholder{
color:#e0e7ff;
}

/* BUTTON */
.btn{
background:white;
color:#1e3a8a;
font-weight:600;
border-radius:10px;
transition:0.3s;
}

.btn:hover{
background:#e0ecff;
transform:scale(1.04);
}

/* ERROR */
.alert{
background:#ef4444;
color:white;
border:none;
border-radius:10px;
}

/* FOOTER */
.login-footer{
position:absolute;
bottom:12px;
width:100%;
text-align:center;
font-size:13px;
color:#cbd5f5;
letter-spacing:0.5px;
opacity:0.9;
}

</style>

</head>

<body>

<div class="login-box animate__animated animate__fadeInUp">

<!-- LOGO -->
<img src="{% static 'logo.gif' %}" class="logo" alt="College Logo">

<!-- TITLE -->
<div class="title">
Nallamuthu Gounder Mahalingam College
</div>

<div class="subtitle">
Database Login
</div>

<!-- MESSAGES -->
{% if messages %}
    {% for message in messages %}
        <div class="alert text-center mb-3 animate__animated animate__shakeX">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input name="username" class="form-control mb-3" placeholder="Username" required>

<input name="password" type="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn w-100">Login</button>

</form>

</div>

<!-- 🔥 FOOTER -->
<footer class="login-footer">
    © 2026 NGM College. All rights reserved.
</footer>

</body>
</html>
