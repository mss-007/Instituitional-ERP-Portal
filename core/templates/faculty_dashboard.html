{% extends 'base.html' %}
{% block title %}Faculty Dashboard{% endblock %}

{% block content %}

<form method="GET" class="mb-3">
<input name="q" class="form-control" placeholder="Search students">
</form>

<div class="card p-4">

<table class="table table-hover">

<tr>
<th>Name</th>
<th>Department</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{ s.name }}</td>
<td>{{ s.department }}</td>
<td>
<a href="/student/{{ s.id }}" class="btn btn-sm btn-info">View</a>
</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
